name: Unit test

on:
  workflow_call:
    inputs:
      coverage:
        type: boolean
        description: 'Run coverage tests'
        required: false
        default: false
    secrets:
      codecov_token:
        description: 'Codecov token'
        required: false
      token:
        description: 'GitHub token'
        required: false

jobs:
  unit-tests:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - run: go generate ./...

      - name: Unit tests
        if: '!inputs.coverage'
        run: |
          go install github.com/jstemmer/go-junit-report/v2@latest
          go install github.com/vakenbolt/go-test-report@latest
          env CGO_ENABLED=0 go test -C v2 -v ./... 2>&1 > out.txt || true
          env CGO_ENABLED=0 go test -C v2 -v ./... -json 2>&1 > json-out.txt || true
          cd v2
          cat ../out.txt | go-junit-report -out ../report.xml -iocopy
          cat ../json-out.txt | go-test-report -o ../report.html

      - name: Unit tests coverage
        if: inputs.coverage
        run: |
          env CGO_ENABLED=0 go test -C v2 -v ./... -coverprofile ../coverage.out -coverpkg=./... -covermode atomic

      - uses: codecov/codecov-action@0fb7174895f61a3b6b78fc075e0cd60383518dac # v5.5.5
        if: always() && inputs.coverage
        with:
          token: ${{ secrets.codecov_token }}
          fail_ci_if_error: true

      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        if: always() && inputs.coverage
        with:
          name: coverage
          path: coverage.out
          if-no-files-found: error
          retention-days: 30

      - name: Publish Test Report
        if: always() && !inputs.coverage
        uses: mikepenz/action-junit-report@d9f48fc87bc235f7e214acf696ca5abc0a986f16 # v6.4.2
        with:
          report_paths: "report.xml"
          require_tests: true
          check_retries: true
          detailed_summary: true
          fail_on_failure: true
          token: ${{ secrets.token }}
          check_name: Unit Tests

      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        if: always() && !inputs.coverage
        with:
          name: test-report-xml
          path: report.xml
          if-no-files-found: error
          retention-days: 30

      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        if: always() && !inputs.coverage
        with:
          name: test-report-html
          path: report.html
          if-no-files-found: error
          retention-days: 30
